    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:tahersahbi7@gmail.com}
    password: ${EMAIL_PASSWORD:ofswwnnicgclvatr}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
