# ─── Application (microservice: garder pour Eureka / API Gateway) ─────────────
spring.application.name=user-service
server.port=8087

# Session (complément au cookie OAuth2) : renvoi cohérent après redirections
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql-db:3306/learnify?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── SendGrid (aligné sur ang : clé = SENDGRID_API_KEY) ─────────────────────────
# « : » à la fin = valeur vide si la variable est absente : le service démarre quand même
# (forgot-password répond 200 comme avant). Sans clé réelle, aucun e-mail ne part — logs EmailService.
# Pour exiger la clé au démarrage comme dans ang pur : utiliser ${SENDGRID_API_KEY} sans défaut.
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from=wwiem7653@gmail.com

# ─── WebAuthn ─────────────────────────────────────────────────────────────────
webauthn.rpId=localhost
webauthn.rpName=learnify
webauthn.origin=http://localhost:4200

# ─── Google OAuth2 ────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=347252530779-s7on04e1it4bu9todt6ph38fk8lcqp5j.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=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
spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Comme ang/UserAndPreevaluation (backend :8080 là-bas) : callback OAuth sur le user-service, pas sur Angular :4200.
# Dans Google Cloud Console → client OAuth Web → ajoute EXACTEMENT cette URI (adapter le port si tu changes server.port).
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8087/login/oauth2/code/google}
server.forward-headers-strategy=framework

# ─── Eureka (intégration microservices) ───────────────────────────────────────
# Pas de serveur sur :8761 ? Utilise le profil « local » pour désactiver Eureka :
# mvn spring-boot:run -Dspring-boot.run.profiles=local
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ─── Après Google OAuth : redirection vers le SPA (route Angular /oauth2/redirect). Jamais :8087.
app.oauth2-redirect-base=${APP_OAUTH2_REDIRECT_BASE:http://localhost:4200}

# ─── Frontend URL (QR login : URL encodée dans le QR, vue par le téléphone) ─
# localhost = OK uniquement si tu testes sur le même PC. Depuis un téléphone : IP LAN (voir application-local).
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

# ─── Nouvel appareil (comme ang) : e-mail Confirm / Reject, page device-pending ─
# false = si login depuis un device inconnu → 403 + token → e-mail + /auth/device-pending.
# true = désactive la vérif (dev rapide). Le profil « local » force true dans application-local.properties.
app.skip-device-confirmation=false

# Local : journaliser le PIN de déblocage (voir aussi profil application-local.properties).
app.security.log-unblock-pin-in-dev=${APP_LOG_UNBLOCK_PIN:false}
