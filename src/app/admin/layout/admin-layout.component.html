<div class="admin-wrapper" [class.sidebar-collapsed]="sidebarCollapsed">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <i class="ti ti-school"></i>
      </div>
      <span class="brand-text">Learnify<span class="brand-accent">English</span></span>
      <span class="brand-badge">Admin</span>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-title">Main Menu</span>
      <a *ngFor="let item of navItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <i [class]="item.icon"></i>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/" class="nav-item back-link">
        <i class="ti ti-arrow-left"></i>
        <span class="nav-label">Back to Site</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="admin-main">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-left">
        <button class="sidebar-toggle" (click)="toggleSidebar()">
          <i class="ti ti-menu-2"></i>
        </button>
        <div class="search-box">
          <i class="ti ti-search"></i>
          <input type="text" placeholder="Search anything..." />
        </div>
      </div>
      <div class="header-right">
        <button class="header-icon-btn" title="Notifications">
          <i class="ti ti-bell"></i>
          <span class="notification-dot"></span>
        </button>
        <button class="header-icon-btn" title="Messages">
          <i class="ti ti-message"></i>
        </button>
        <div class="header-divider"></div>
        <div class="user-menu">
          <div class="user-avatar">
            <i class="ti ti-user"></i>
          </div>
          <div class="user-info">
            <span class="user-name">Admin User</span>
            <span class="user-role">Super Admin</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="admin-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
