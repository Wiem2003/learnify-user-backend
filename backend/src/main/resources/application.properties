spring.application.name=learnivo

# Set to true once to fix "Tablespace exists" / "Table doesn't exist", then set back to false
learnivo.reset-db-on-startup=false

# MySQL datasource configuration
spring.datasource.url=jdbc:mysql://localhost:3306/learnify?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Run schema.sql on startup so tables exist (then Hibernate can update if needed)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JPA / Hibernate (dialect auto-detected; open-in-view off to avoid warning)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server port (changed from default 8080 to avoid conflict)
server.port=8082

# File upload settings (CV + certificate can both be sent; allow up to 20MB total per request)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=25MB
file.upload-dir=uploads
