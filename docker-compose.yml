version: "3.8"

networks:
  learnify-net:
    driver: bridge

volumes:
  mysql_data:

services:

  # ─────────────────────────────────────────────────────────────────────────
  # ONE MySQL instance — all databases inside
  # ─────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts/init-all-dbs.sql:/docker-entrypoint-initdb.d/init-all-dbs.sql:ro
    networks:
      - learnify-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # EUREKA
  # ─────────────────────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - learnify-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # MICROSERVICES — all point to the single mysql container
  # ─────────────────────────────────────────────────────────────────────────
  event-service:
    build:
      context: ./event-service
      dockerfile: Dockerfile
    container_name: event-service
    ports:
      - "8081:8081"
    networks:
      - learnify-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/event_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8081
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    networks:
      - learnify-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVER_PORT: 8082
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      EMAIL_USERNAME: ${EMAIL_USERNAME:-tahersahbi7@gmail.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-ofswwnnicgclvatr}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  certificate-service:
