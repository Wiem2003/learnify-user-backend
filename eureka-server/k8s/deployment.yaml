apiVersion: apps/v1
kind: Deployment

metadata:
  name: eureka-server
  namespace: learnify

spec:
  replicas: 1

  selector:
    matchLabels:
      app: eureka-server

  template:
    metadata:
      labels:
        app: eureka-server

    spec:
      containers:
        - name: eureka-server
          image: wiwi2003/eureka-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8761