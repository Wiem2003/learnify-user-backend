server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # Ne pas s'enregistrer lui-même comme client
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Désactiver la protection en mode développement
    enable-self-preservation: false
    # Intervalle d'éviction (nettoyage des services morts)
    eviction-interval-timer-in-ms: 10000

# Logging
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
