spring.application.name=USER-SERVICE
server.port=${SERVER_PORT:8087}

# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── SendGrid ─────────────────────────────────────────────────────────────────
sendgrid.api-key=${SENDGRID_API_KEY:SG.placeholder}
sendgrid.from=${SENDGRID_FROM:wwiem7653@gmail.com}

# ─── WebAuthn ─────────────────────────────────────────────────────────────────
webauthn.rpId=${WEBAUTHN_RP_ID:localhost}
webauthn.rpName=${WEBAUTHN_RP_NAME:learnify}
webauthn.origin=${WEBAUTHN_ORIGIN:http://localhost:4200}

# ─── Google OAuth2 ────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:347252530779-s7on04e1it4bu9todt6ph38fk8lcqp5j.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# ─── Eureka ───────────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
