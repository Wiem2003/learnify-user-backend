name: CI - Build & Test All Microservices

on:
  push:
    branches: [ main, integration-backend, certificate, payment ]
  pull_request:
    branches: [ main, integration-backend ]

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - course-service
          - event-service
          - payment-service
          - certificate-service
          - quiz-feedback-service
          - ai-service
          - job-service
          - preevaluation-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        run: mvn clean package -DskipTests --no-transfer-progress
        working-directory: ${{ matrix.service }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/target/*.jar
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build eureka-server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: false
          tags: learnify/eureka-server:latest

      - name: Build api-gateway Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: false
          tags: learnify/api-gateway:latest
