apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: learnify
  labels:
    app: event-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: learnify/event-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_APPLICATION_NAME
              value: "event-service"
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://event-db:3306/event_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: event-db-secret
                  key: MYSQL_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE
              value: "10MB"
            - name: SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE
              value: "10MB"
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /api/events
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/events
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: event-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: learnify
  labels:
    app: event-service
spec:
  selector:
    app: event-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
# PVC for uploaded event images
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: event-uploads-pvc
  namespace: learnify
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
