<section class="py-lg-13 py-8 bg-light bg-opacity-50" id="testimonials">
  <div class="container">
    <div class="row text-center">
      <div class="col-lg-6 mx-auto">
        <div class="mb-10">
          <span class="text-primary text-uppercase small fw-semibold" style="letter-spacing: .125rem;">Testimonials</span>
          <h2 class="fw-bold mt-4 mb-4">What Our <span class="text-primary">Students Say</span></h2>
          <p class="mb-0">
            Hear from thousands of students who have transformed their careers with LearnHub.
          </p>
        </div>
      </div>
    </div>
    <div class="row g-4">
      @for (t of testimonials; track t.name) {
        <div class="col-lg-4">
          <div class="card shadow-sm h-100 rounded-5 border-0 p-5">
            <p class="text-body mb-4">"{{ t.quote }}"</p>
            <div class="d-flex align-items-center gap-3">
              <img [src]="t.avatar" [alt]="t.name" class="avatar avatar-md rounded-circle">
              <div>
                <div class="fw-bold">{{ t.name }}</div>
                <small class="text-body-secondary">{{ t.role }}</small>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
