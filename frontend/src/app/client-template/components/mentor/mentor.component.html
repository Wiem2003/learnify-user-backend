<section class="py-lg-13 py-8 bg-light bg-opacity-25" id="mentor">
  <div class="container">
    <div class="row text-center">
      <div class="col-lg-5 mx-auto">
        <div class="mb-10">
          <span class="text-primary text-uppercase small fw-semibold" style="letter-spacing: .125rem;">Mentors</span>
          <h2 class="fw-bold mt-4 mb-4">Learn From Industry <span class="text-primary">Experts</span></h2>
          <p class="mb-0">
            Our mentors are industry leaders with years of experience in their respective fields.
          </p>
        </div>
      </div>
    </div>
    <div class="row g-4 justify-content-center">
      @for (mentor of mentors; track mentor.name) {
        <div class="col-lg-4 col-md-6">
          <div class="card shadow-sm h-100 rounded-5 card-lift border-0 text-center p-5">
            <img [src]="mentor.avatar" [alt]="mentor.name" class="avatar avatar-xl rounded-circle mx-auto mb-3">
            <h5 class="fw-bold">{{ mentor.name }}</h5>
            <p class="text-body-secondary mb-0 small">{{ mentor.role }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
