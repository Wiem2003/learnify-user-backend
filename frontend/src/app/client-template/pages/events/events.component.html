<app-navbar></app-navbar>

<section class="py-8 bg-light">
  <div class="container">
    <div class="row mb-3">
      <div class="col-12">
        <div class="d-flex flex-wrap gap-2">
          <a routerLink="/" class="btn btn-sm btn-outline-secondary">Back to Home</a>
          <a routerLink="/courses" class="btn btn-sm btn-outline-primary">Go to Courses</a>
          <a routerLink="/clubs" class="btn btn-sm btn-outline-primary">Join Club</a>
          <a routerLink="/messenger" class="btn btn-sm btn-outline-primary">Open Messenger</a>
        </div>
      </div>
    </div>
    <div class="row mb-6">
      <div class="col-12 text-center">
        <h1 class="display-4 fw-bold">Events</h1>
        <p class="lead text-muted">Participate in events and expand your learning</p>
      </div>
    </div>

    <div class="row g-4">
      @for (event of events; track event.id) {
        <div class="col-lg-4 col-md-6">
          <div class="card shadow-sm h-100 rounded-4 card-hover overflow-hidden">
            <div class="position-relative overflow-hidden">
              <img [src]="event.image" class="card-img-top" [alt]="event.title" style="height: 160px; object-fit: cover;">
              <div class="position-absolute top-0 start-0 p-3">
                <span class="badge bg-primary rounded-pill">{{ event.date }}</span>
              </div>
            </div>
            <div class="card-body p-4">
              <h5 class="card-title mb-2 fw-bold">{{ event.title }}</h5>
              <p class="card-text text-muted small mb-3">{{ event.description }}</p>
              <div class="small text-muted mb-3">
                <span>{{ event.time }}</span>
                <span class="mx-1">•</span>
                <span>{{ event.location }}</span>
              </div>
              <div class="d-flex justify-content-between align-items-center">
                <span class="small text-muted">{{ event.participants }} participants</span>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-outline-primary" (click)="viewEvent(event)">View</button>
                  <button class="btn btn-sm btn-primary" (click)="joinEvent(event)">Join</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<app-footer></app-footer>
