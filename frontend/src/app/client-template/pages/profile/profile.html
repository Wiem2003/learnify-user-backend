<div class="container py-5" style="max-width: 1100px;">
  <div class="row g-4">

    <!-- LEFT CARD -->
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-body text-center p-4">

          <!-- ✅ Avatar dynamique + anti-cache -->
         <img
  [src]="getAvatarSrc()"
  alt="avatar"
  style="width:120px;height:120px;border-radius:50%;object-fit:cover;"
/>


          <!-- ✅ input file + upload -->
          <div class="mt-3">
           <!-- input caché -->
<input
  type="file"
  #fileInput
  hidden
  accept="image/png,image/jpeg"
  (change)="onFileSelected($event)"
/>

<!-- bouton custom -->
<button
  type="button"
  class="btn btn-outline-secondary w-100"
  (click)="fileInput.click()"
>
  Choose file
</button>

<!-- nom du fichier -->
<div class="text-muted mt-1" *ngIf="selectedFile">
  {{ selectedFile.name }}
</div>

          </div>

          <div class="mt-2">
            <button
              type="button"
              class="btn btn-outline-primary w-100"
              (click)="uploadAvatar()"
              [disabled]="!selectedFile || loading"
            >
              Upload Photo
            </button>
          </div>

          <h4 class="mt-3 mb-1">
            {{ (user.firstName || '') + ' ' + (user.lastName || '') }}
          </h4>

          <div class="text-muted">{{ user.email }}</div>

          <hr class="my-4" />

          <h5 class="text-primary mb-2">About</h5>
          <p class="text-muted mb-0">
            Ici tu peux modifier tes informations personnelles.
          </p>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-lg-8">

      <!-- PERSONAL DETAILS -->
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

          <div class="d-flex align-items-center justify-content-between mb-3">
            <h4 class="text-primary mb-0">Personal Details</h4>
            <div *ngIf="loading" class="text-muted">Chargement...</div>
          </div>

          <form (ngSubmit)="save()" #f="ngForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input class="form-control" [(ngModel)]="user.firstName" name="firstName" required />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input class="form-control" [(ngModel)]="user.lastName" name="lastName" required />
              </div>

              <div class="col-12 mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" [(ngModel)]="user.email" name="email" required type="email" />
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-3">
              <button type="button" class="btn btn-secondary" (click)="load()" [disabled]="loading">
                Cancel
              </button>

              <button type="submit" class="btn btn-primary" [disabled]="loading || f.invalid">
                Update
              </button>
            </div>
          </form>

        </div>
      </div>

      <!-- CHANGE PASSWORD -->
      <div class="card border-0 shadow-sm mt-4">
        <div class="card-body p-4">

          <div class="d-flex align-items-center justify-content-between mb-3">
            <h4 class="text-primary mb-0">Change Password</h4>
          </div>

          <form (ngSubmit)="changePassword()" #pf="ngForm">
            <div class="row">

              <div class="col-md-4 mb-3">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-control" [(ngModel)]="currentPassword" name="currentPassword" required />
              </div>

              <div class="col-md-4 mb-3">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" [(ngModel)]="newPassword" name="newPassword" required minlength="6" />
                <small class="text-muted">Min 6 caractères</small>
              </div>

              <div class="col-md-4 mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" [(ngModel)]="confirmNewPassword" name="confirmNewPassword" required minlength="6" />
              </div>

            </div>

            <div class="d-flex justify-content-end">
              <button type="submit" class="btn btn-outline-primary" [disabled]="loading || pf.invalid">
                Update Password
              </button>
            </div>
          </form>

        </div>
      </div>

    </div>

  </div>
</div>
