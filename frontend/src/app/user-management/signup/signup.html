<div class="site-section">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-md-5">

        <h3 class="text-center mb-4">
          Register as {{ role | titlecase }}
        </h3>

        <form (ngSubmit)="onSubmit(role)">

          <div class="form-group">
            <label>First Name</label>
            <input type="text"
                   class="form-control form-control-lg"
                   [(ngModel)]="firstName"
                   name="firstName"
                   placeholder="First name"
                   required>
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text"
                   class="form-control form-control-lg"
                   [(ngModel)]="lastName"
                   name="lastName"
                   placeholder="Last name"
                   required>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email"
                   class="form-control form-control-lg"
                   [(ngModel)]="email"
                   name="email"
                   placeholder="Email"
                   required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password"
                   class="form-control form-control-lg"
                   [(ngModel)]="password"
                   name="password"
                   placeholder="Password"
                   required>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-primary btn-lg px-5">
              Sign Up
            </button>
          </div>

        </form>

        <br>

        <div class="text-center">
          <p>
            Already have an account?
            <a [routerLink]="['/auth/login']" [queryParams]="{ role: role }">
              Login
            </a>
          </p>
        </div>

      </div>
    </div>

  </div>
</div>
