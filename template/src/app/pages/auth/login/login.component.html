<section class="py-8 bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm rounded-4">
          <div class="card-body p-4">
            <h5 class="card-title mb-3 text-center">Sign in</h5>
            <form #loginForm="ngForm" (ngSubmit)="submit()">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" [(ngModel)]="form.email" name="email" required email #emailRef="ngModel" />
                @if (emailRef.invalid && (emailRef.dirty || emailRef.touched)) {
                  <span class="text-danger small">Email requis et doit être valide.</span>
                }
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" [(ngModel)]="form.password" name="password" required minlength="1" #passwordRef="ngModel" />
                @if (passwordRef.invalid && (passwordRef.dirty || passwordRef.touched)) {
                  <span class="text-danger small">Mot de passe requis.</span>
                }
              </div>
              @if (error) {
                <p class="text-danger small mb-2">{{ error }}</p>
              }
              <button type="submit" class="btn btn-primary w-100" [disabled]="loading || loginForm.invalid">
                {{ loading ? 'Signing in…' : 'Sign in' }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
