server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      # Configuration globale
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: 
              - "http://localhost:4200"
              - "http://localhost:4201"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      
      # Routes vers les microservices
      routes:
        # Route pour les événements
        - id: event-service-events
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/events/**
          filters:
            - StripPrefix=1
        
        # Route pour les réservations
        - id: event-service-reservations
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/reservations/**
          filters:
            - StripPrefix=1
        
        # Route pour l'IA
        - id: event-service-ai
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
      
      # Configuration de découverte
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# Configuration Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.netflix.eureka: INFO
    reactor.netty: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
