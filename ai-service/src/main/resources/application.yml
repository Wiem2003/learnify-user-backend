server:
  port: 8085

spring:
  application:
    name: ai-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/learnify?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # MongoDB for chat history (advanced microservice technology — different DB per service)
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/ai_chat_db}
      database: ai_chat_db

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

gemini:
  api:
    key: AIzaSyDRjSoMWQKu7htQMlG9TWTjOEU8Nc_EvGA
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
