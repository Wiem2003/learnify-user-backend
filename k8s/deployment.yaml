apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-service
  namespace: learnify

spec:
  replicas: 1

  selector:
    matchLabels:
      app: user-service

  template:
    metadata:
      labels:
        app: user-service

    spec:
      containers:
        - name: user-service
          image: wiwi2003/user-service:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8087